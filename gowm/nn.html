<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question...</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            color: #d63031;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 150px; /* Added extra height to accommodate the growing button */
            width: 100%;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease; /* Smooth growing animation */
        }

        #yesBtn {
            background-color: #ff7675;
            color: white;
            z-index: 10; /* Ensures it stays on top of other elements as it gets huge */
        }

        #noBtn {
            background-color: #b2bec3;
            color: white;
        }

        .hidden {
            display: none;
        }

        .celebration {
            font-size: 4rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="questionContainer" class="container">
        <h1>Will you go out with me? 🌹</h1>
        <div class="buttons">
            <button id="yesBtn">Yes!</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div id="successContainer" class="container hidden">
        <div class="celebration">🎉❤️✨</div>
        <h1>Yay! It's a date!</h1>
        <p>Can't wait! Let me know when you're free.</p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionContainer = document.getElementById('questionContainer');
        const successContainer = document.getElementById('successContainer');

        let yesScale = 1; // Track the current size of the Yes button

        // Make the No button run away AND make the Yes button grow
        noBtn.addEventListener('mouseover', () => {
            // 1. Move No button to a random spot
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;

            // 2. Grow the Yes button by 20% each time
            yesScale += 0.2;
            yesBtn.style.transform = `scale(${yesScale})`;
        });

        // Handle the Yes button click
        yesBtn.addEventListener('click', () => {
            questionContainer.classList.add('hidden');
            successContainer.classList.remove('hidden');
        });
    </script>
</body>
</html>
